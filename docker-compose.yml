services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crypto_quiz}
      MYSQL_USER: ${MYSQL_USER:-crypto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crypto_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./admin/ruoyi-vue/sql/ry_20260320.sql:/docker-entrypoint-initdb.d/01-ruoyi.sql:ro
      - ./admin/ruoyi-vue/sql/crypto_quiz_cleanup.sql:/docker-entrypoint-initdb.d/02-ruoyi-cleanup.sql:ro
      - ./admin/ruoyi-vue/sql/crypto_quiz_menu.sql:/docker-entrypoint-initdb.d/03-ruoyi-menu.sql:ro
      - ./admin/ruoyi-vue/sql/crypto_quiz_roles.sql:/docker-entrypoint-initdb.d/04-ruoyi-roles.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_DIALECT: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-crypto_quiz}
      DB_USER: ${MYSQL_USER:-crypto_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-crypto_pass}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_this_admin_password}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    ports:
      - "${BACKEND_BIND_ADDRESS:-0.0.0.0}:5000:5000"

  ruoyi-admin:
    build:
      context: ./admin/ruoyi-vue
      dockerfile: ruoyi-admin/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE:-crypto_quiz}
      MYSQL_USER: ${MYSQL_USER:-crypto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crypto_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUOYI_TOKEN_SECRET: ${RUOYI_TOKEN_SECRET:-change_this_ruoyi_secret}
      RUOYI_API_DOCS_ENABLED: ${RUOYI_API_DOCS_ENABLED:-false}
      RUOYI_SWAGGER_UI_ENABLED: ${RUOYI_SWAGGER_UI_ENABLED:-false}
    ports:
      - "${RUOYI_ADMIN_BIND_ADDRESS:-0.0.0.0}:${RUOYI_ADMIN_PORT:-8080}:8080"

  ruoyi-ui:
    build:
      context: ./admin/ruoyi-vue/ruoyi-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - ruoyi-admin
    ports:
      - "${RUOYI_UI_BIND_ADDRESS:-0.0.0.0}:${RUOYI_UI_PORT:-8081}:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
        REACT_APP_ADMIN_PORTAL_URL: ${REACT_APP_ADMIN_PORTAL_URL:-http://localhost:8081}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
